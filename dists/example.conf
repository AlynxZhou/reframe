[reframe]
# Select monitor via DRM card and connector. All available cards and connectors
# can be found in `/sys/class/drm/`. If both of them are empty, the first
# connected connector and its card will be used.
card=
connector=
# This is the angle you rotate the monitor, not the angle of display content
# relative to the monitor! Valid angles are clockwise `0`, `90`, `180`, `270`.
rotation=0
# If you have more than 1 monitors, set those values to the logical size of the
# whole virtual desktop. You can get those value by finding the pointer position
# of the right most and bottom most border of your monitors.
desktop-width=0
desktop-height=0
# If you have more than 1 monitors, set those values to the logical position of
# the top left corner of your selected monitor.
monitor-x=0
monitor-y=0
# If your client does not support resizing, use those to force a size. Empty or
# `0` means monitor size.
default-width=0
default-height=0
# Set to `false` to prohibit client resizing.
resize=true
# Set to `false` to ignore DRM cursor plane.
cursor=true
# Cross-monitor cursor follow (multi-monitor on compositors that confine an
# absolute pointer to a single output, e.g. cosmic-comp / COSMIC on Wayland).
# The streamer detects which monitor physically shows the cursor (via the DRM
# cursor plane) and, when a pointer event arrives for a monitor that does NOT
# currently have the cursor, performs one relative burst to bring the cursor
# onto this monitor before forwarding the absolute event.
#
# `position-x` is this monitor's real desktop X-position (top-left corner) in
# desktop pixels. It is used ONLY as this monitor's owner identity and to pick
# the relocation direction; it is SEPARATE from `monitor-x`. Keep
# `desktop-width` = THIS monitor's width and `monitor-x` = 0 so absolute
# positioning stays precise/full-range within the monitor.
#
# Example (DP-1 leftmost at x=0, DP-3 to its right at x=1920):
#   DP-1:  position-x=0      (plus desktop-width=<DP-1 width>, monitor-x=0)
#   DP-3:  position-x=1920   (plus desktop-width=<DP-3 width>, monitor-x=0)
position-x=0
# Set to `false` if you already disabled automatic screen blank.
wakeup=true
# Set to `gpu` to use GPU damage region detection, which may be more efficiency
# but may cause artifacts depending on GPU vendors. Set to `cpu` to use CPU
# damage region detection if you get bugs with `gpu`. Empty to disable damage
# region detection, which may require higher network bandwidth.
damage=cpu
fps=30

[vnc]
# Empty means accept all incoming connections. If you have more than 1 IP
# addresses to listen, use `;` to seperate them. If you are still using unstable
# version of neatvnc, only the first is supported to listen.
ip=
port=5933
# Empty means no password.
password=
# Set to `neatvnc` to prefer neatvnc, which provides more encoding methods.
type=libvncserver

[libvncserver]

[neatvnc]
username=
# Set to `true` to keep compatibility with legacy VNC clients that do not support
# modern security types, such as macOS Screen Sharing. Otherwise set to `false`
# to improve security.
allow-broken-crypto=false
rsa-private-key-file=
tls-private-key-file=
tls-certificate-file=
